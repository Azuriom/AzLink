plugins {
    id 'net.minecraftforge.gradle' version '5.1.74'
    id 'com.github.johnrengelman.shadow' version '7.1.2'
}

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

ext {
    minecraft_version = '1.20.1'
    forge_version = '47.4.10'
}

minecraft {
    mappings('official', '1.20.1')

    runs {
        server {
            workingDirectory = file('run')
        }
    }
}

configurations {
    shade
    implementation.extendsFrom shade
}

dependencies {
    minecraft "net.minecraftforge:forge:${minecraft_version}-${forge_version}"

    shade project(':azlink-common')
    shade 'net.kyori:adventure-api:4.21.0'
    shade 'net.kyori:adventure-text-serializer-gson:4.21.0'
    shade 'net.kyori:adventure-text-serializer-legacy:4.21.0'
    shade 'io.netty:netty-codec-http:4.1.82.Final'
}

processResources {
    filesMatching('**/*.toml') {
        expand 'version': project.version
    }
}

shadowJar {
    archiveFileName = "AzLink-Forge-${project.version}-${project.ext.minecraft_version}.jar"
    configurations = [project.configurations.shade]

    dependencies {
        include dependency('com.azuriom:.*')
        include dependency('net.kyori:.*')
        include dependency('io.netty:netty-codec-http')
    }

    relocate 'net.kyori', 'com.azuriom.azlink.libs'
}

reobf {
    shadowJar {}
}

build {
    dependsOn shadowJar
    dependsOn reobfShadowJar
}
