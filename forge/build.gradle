plugins {
    id 'net.minecraftforge.gradle' version '[6.0.24,6.2)'
    id 'com.gradleup.shadow' version '9.2.2'
}

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

ext {
    minecraft_version = '1.21.1'
    forge_version = '52.1.0'
}

dependencies {
    def forgeVersion = "${project.ext.minecraft_version}-${project.ext.forge_version}"

    implementation project(':azlink-common')
    minecraft "net.minecraftforge:forge:${forgeVersion}"
}

minecraft {
    mappings channel: 'official', version: project.ext.minecraft_version
}

processResources {
    filesMatching('**/*.toml') {
        expand 'version': version
    }
}

shadowJar {
    archiveFileName = "AzLink-Forge-${project.version}-${project.ext.minecraft_version}.jar"

    dependencies {
        include dependency('com.azuriom:.*')
    }
}

build {
    dependsOn shadowJar
}
